name: AI Daily Brief

on:
  # Chạy 3 lần/ngày: 7AM, 12PM, 7PM Vietnam (0:00, 5:00, 12:00 UTC)
  schedule:
    - cron: '0 0 * * *'      # 7 AM Vietnam
    - cron: '0 5 * * *'      # 12 PM Vietnam
    - cron: '0 12 * * *'     # 7 PM Vietnam
  # Cho phép chạy thủ công
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r ai-daily-brief/requirements.txt

    - name: Run AI Daily Brief
      env:
        FIRECRAWL_API: ${{ secrets.FIRECRAWL_API }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        cd ai-daily-brief
        python3 main.py

    - name: Commit and push report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ai-daily-brief/reports/
        git diff --staged --quiet || git commit -m "Update AI Daily Brief $(date +%Y-%m-%d)"
        git push
